<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CARGO – לוח בקרה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --navy:#082138; --blue:#0078d8; --blue-dk:#0062b0; --gold:#ffb84a;
      --bg:#eef4fb; --white:#fff; --g50:#f7fafd; --g100:#e8f0f8; --g200:#cddaeb;
      --g400:#8fa3b8; --g600:#4a637a; --g800:#1b2f42;
      --rad:12px; --shd:0 4px 28px rgba(8,33,56,.11);
    }
    body { font-family:'Rubik',sans-serif; background:var(--bg); color:var(--g800); min-height:100vh; direction:rtl; }

    /* HEADER */
    .header { background:var(--navy); padding:14px 28px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:50; }
    .header img { height:34px; }
    .hd-sep { width:1px; height:26px; background:rgba(255,255,255,.18); }
    .hd-label { color:rgba(255,255,255,.7); font-size:14px; font-weight:500; }
    .hd-right { margin-inline-start:auto; display:flex; align-items:center; gap:14px; }
    .refresh-btn { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:white; padding:7px 14px; border-radius:8px; font-family:'Rubik',sans-serif; font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:7px; transition:background .18s; }
    .refresh-btn:hover { background:rgba(255,255,255,.2); }
    .last-upd { color:rgba(255,255,255,.45); font-size:12px; }
    .form-link { color:var(--gold); font-size:13px; font-weight:600; text-decoration:none; }
    .form-link:hover { text-decoration:underline; }

    /* LOGIN GATE */
    .gate { position:fixed; inset:0; background:linear-gradient(135deg,#071d33,#0a4a82); display:flex; align-items:center; justify-content:center; z-index:200; }
    .gate-card { background:white; border-radius:16px; padding:40px 44px; box-shadow:0 20px 60px rgba(0,0,0,.3); width:min(380px,90vw); text-align:center; }
    .gate-card img { height:38px; margin-bottom:8px; }
    .gate-title { font-size:18px; font-weight:700; color:var(--navy); margin-bottom:4px; }
    .gate-sub { font-size:13px; color:var(--g400); margin-bottom:24px; }
    .gate-input { width:100%; padding:13px 16px; border:1.5px solid var(--g200); border-radius:10px; font-family:'Rubik',sans-serif; font-size:15px; text-align:center; letter-spacing:2px; margin-bottom:14px; direction:ltr; }
    .gate-input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,120,216,.13); }
    .gate-btn { width:100%; padding:13px; background:var(--blue); color:white; border:none; border-radius:10px; font-family:'Rubik',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:background .18s; }
    .gate-btn:hover { background:var(--blue-dk); }
    .gate-err { color:#dc2626; font-size:13px; margin-top:12px; min-height:18px; }

    /* WRAP */
    .wrap { max-width:1280px; margin:0 auto; padding:28px 22px 60px; }

    /* STAT CARDS (sum per status) */
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:28px; }
    .stat { background:white; border-radius:var(--rad); padding:18px 20px; box-shadow:var(--shd); position:relative; overflow:hidden; cursor:pointer; transition:transform .15s, box-shadow .15s; border:2px solid transparent; }
    .stat:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(8,33,56,.16); }
    .stat.active { border-color:var(--blue); }
    .stat-bar { position:absolute; top:0; inset-inline-start:0; width:100%; height:4px; }
    .stat-num { font-size:32px; font-weight:800; line-height:1; margin-bottom:4px; }
    .stat-label { font-size:13px; color:var(--g600); font-weight:500; }
    .stat-total .stat-num { color:var(--navy); }

    /* OVERVIEW (charts) */
    .overview { display:grid; grid-template-columns:1.1fr 1.4fr; gap:18px; margin-bottom:28px; }
    .ov-card { background:white; border-radius:var(--rad); box-shadow:var(--shd); padding:22px 24px; }
    .ov-title { font-size:14px; font-weight:700; color:var(--navy); margin-bottom:18px; display:flex; align-items:center; gap:8px; }
    .ov-title svg { color:var(--blue); }

    /* donut */
    .donut-wrap { display:flex; align-items:center; gap:24px; }
    .donut { position:relative; flex-shrink:0; }
    .donut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .donut-total { font-size:30px; font-weight:800; color:var(--navy); line-height:1; }
    .donut-cap { font-size:11px; color:var(--g400); margin-top:2px; }
    .legend { display:flex; flex-direction:column; gap:9px; flex:1; }
    .legend-item { display:flex; align-items:center; gap:9px; font-size:13px; cursor:pointer; padding:3px 6px; border-radius:6px; transition:background .12s; }
    .legend-item:hover { background:var(--g50); }
    .legend-item.dim { opacity:.4; }
    .legend-dot { width:11px; height:11px; border-radius:3px; flex-shrink:0; }
    .legend-label { color:var(--g600); flex:1; }
    .legend-val { font-weight:700; color:var(--g800); }

    /* priority bars */
    .pbars { display:flex; flex-direction:column; gap:14px; }
    .pbar-row { display:grid; grid-template-columns:64px 1fr 36px; align-items:center; gap:12px; }
    .pbar-tag { font-size:12px; font-weight:700; padding:4px 0; text-align:center; border-radius:6px; }
    .pbar-track2 { height:14px; background:var(--g100); border-radius:7px; overflow:hidden; }
    .pbar-fill2 { height:100%; border-radius:7px; width:0; transition:width .6s cubic-bezier(.22,.61,.36,1); }
    .pbar-count { font-size:14px; font-weight:700; color:var(--g800); text-align:center; }

    @media (max-width:820px) { .overview { grid-template-columns:1fr; } }

    /* SECTION HEADING for list */
    .list-head { font-size:15px; font-weight:700; color:var(--navy); margin:0 2px 14px; display:flex; align-items:center; gap:8px; }
    .list-head svg { color:var(--blue); }

    /* TOOLBAR */
    .toolbar { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:18px; }
    .search { flex:1; min-width:200px; position:relative; }
    .search input { width:100%; padding:11px 42px 11px 14px; border:1.5px solid var(--g200); border-radius:9px; font-family:'Rubik',sans-serif; font-size:14px; background:white; }
    .search input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,120,216,.13); }
    .search svg { position:absolute; inset-inline-start:14px; top:50%; transform:translateY(-50%); color:var(--g400); }
    .filter-sel { padding:11px 14px; border:1.5px solid var(--g200); border-radius:9px; font-family:'Rubik',sans-serif; font-size:14px; background:white; cursor:pointer; color:var(--g800); }
    .filter-sel:focus { outline:none; border-color:var(--blue); }

    /* TABLE */
    .table-card { background:white; border-radius:var(--rad); box-shadow:var(--shd); overflow:hidden; }
    .table-scroll { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13.5px; }
    thead th { background:var(--navy); color:white; font-weight:600; padding:13px 14px; text-align:right; white-space:nowrap; position:sticky; top:0; }
    tbody td { padding:12px 14px; border-bottom:1px solid var(--g100); vertical-align:middle; }
    tbody tr:hover { background:var(--g50); }
    tbody tr:last-child td { border-bottom:none; }
    .td-num { font-weight:700; color:var(--navy); text-align:center; }
    .td-title { font-weight:500; max-width:280px; }
    .td-desc { color:var(--g600); font-size:12.5px; max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* BADGES */
    .badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; white-space:nowrap; }
    .pri-P0 { background:#fef2f2; color:#dc2626; }
    .pri-P1 { background:#fff7ed; color:#ea580c; }
    .pri-P2 { background:#fffbeb; color:#b45309; }
    .pri-P3 { background:#f0fdf4; color:#16a34a; }
    .type-bug  { background:#fef2f2; color:#991b1b; }
    .type-feat { background:#eff6ff; color:#1d4ed8; }
    .type-int  { background:#f0fdf4; color:#166534; }
    .status-dot-badge { display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; }
    .sd { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

    .files-link { color:var(--blue); font-size:12px; text-decoration:none; font-weight:500; }
    .files-link:hover { text-decoration:underline; }

    /* EMPTY / LOADING */
    .state { text-align:center; padding:60px 20px; color:var(--g400); }
    .spinner { width:36px; height:36px; border:3px solid var(--g200); border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:640px) {
      .td-desc, .col-hide { display:none; }
      .wrap { padding:18px 12px 40px; }
    }
  </style>
</head>

AAAAAAAAAAAAAAWJGwAQAAAAAAAAAAAAAAAAAAAAAAACsSNgAAAAAAAAAAAAAAAAAAAAAAAGBFwgYAAAAAAAAAAAAAAAAAAAAAAACsSNgAAAAAAAAAAAAAAAAAAAAAAACAFQkbAAAAAAAAAAAAAAAAAAAAAAAAsCJhAwAAAAAAAAAAAAAAAAAAAAAAAFYkbAAAAAAAAAAAAAAAAAAAAAAAAMCKhA0AAAAAAAAAAAAAAAAAAAAAAABYkbABAAAAAAAAAAAAAAAAAAAAAAAAKxI2AAAAAAAAAAAAAAAAAAAAAAAAYEXCBgAAAAAAAAAAAAAAAAAAAAAAAKxI2AAAAAAAAAAAAAAAAAAAAAAAAIAVCRsAAAAAAAAAAAAAAAAAAAAAAACwImEDAAAAAAAAAAAAAAAAAAAAAAAAViRsAAAAAAAAAAAAAAAAAAAAAAAAwIqEDQAAAAAAAAAAAAAAAAAAAAAAAFiRsAEAAAAAAAAAAAAAAAAAAAAAAAArEjYAAAAAAAAAAAAAAAAAAAAAAABgRcIGAAAAAAAAAAAAAAAAAAAAAAAArEjYAAAAAAAAAAAAAAAAAAAAAAAAgBUJGwAAAAAAAAAAAAAAAAAAAAAAALAiYQMAAAAAAAAAAAAAAAAAAAAAAABWJGwAAAAAAAAAAAAAAAAAAAAAAADAioQNAAAAAAAAAAAAAAAAAAAAAAAAWJGwAQAAAAAAAAAAAAAAAAAAAAAAACsSNgAAAAAAAAAAAAAAAAAAAAAAAGBFwgYAAAAAAAAAAAAAAAAAAAAAAACsSNgAAAAAAAAAAAAAAAAAAAAAAACAFQkbAAAAAAAAAAAAAAAAAAAAAAAAsBLVoMY25pZGAgAAAABJRU5ErkJggg==" alt="CARGO" onerror="this.style.display='none'" />
  <div class="hd-sep"></div>
  <span class="hd-label">לוח בקרה — משימות ותקלות</span>
  <div class="hd-right">
    <a class="form-link" href="./index.html">+ בקשה חדשה</a>
    <span class="last-upd" id="lastUpd"></span>
    <button class="refresh-btn" id="refreshBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      רענן
    </button>
  </div>
</header>

<!-- MAIN -->
<div class="wrap" id="main" style="display:none">
  <div class="stats" id="stats"></div>

  <!-- OVERVIEW: donut by status + bars by priority -->
  <div class="overview">
    <div class="ov-card">
      <div class="ov-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
        התפלגות לפי סטטוס
      </div>
      <div class="donut-wrap">
        <div class="donut" id="donut"></div>
        <div class="legend" id="donutLegend"></div>
      </div>
    </div>

    <div class="ov-card">
      <div class="ov-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="7"/><rect x="12" y="6" width="3" height="11"/><rect x="17" y="13" width="3" height="4"/></svg>
        התפלגות לפי עדיפות
      </div>
      <div class="pbars" id="priBars"></div>
    </div>
  </div>

  <div class="list-head">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    רשימת משימות
  </div>

  <div class="toolbar">
    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="חיפוש משימה, גורם יוזם, מערכת..." />
    </div>
    <select class="filter-sel" id="typeFilter">
      <option value="">כל הסוגים</option>
      <option value="תקלה">תקלה</option>
      <option value="פיצ'ר">פיצ'ר</option>
      <option value="אינטגרציה">אינטגרציה</option>
    </select>
    <select class="filter-sel" id="priFilter">
      <option value="">כל העדיפויות</option>
      <option value="P0">P0 — קריטי</option>
      <option value="P1">P1 — גבוה</option>
      <option value="P2">P2 — בינוני</option>
      <option value="P3">P3 — נמוך</option>
    </select>
  </div>

  <div class="table-card">
    <div id="tableArea">
      <div class="state"><div class="spinner"></div>טוען נתונים...</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════
var SCRIPT_URL = 'https://script.google.com/a/macros/cargo.co.il/s/AKfycbxgDEoaoxXRc0C4KITCOeWB_Y9Dw-JX1e3blzVh4ATKMr0P9oZyXtY-kHQWsE5roYemXw/exec';
var PASSWORD   = 'cargo2026';   // 🔧 שנו לסיסמה הרצויה

// ── status colors ──────────────────────────────────────
var STATUS_COLORS = {
  'פתוח ביצירה': '#3b82f6',
  'בטיפול':      '#f59e0b',
  'ממתין':       '#a855f7',
  'נסגר':        '#22c55e',
  'בוטל':        '#94a3b8'
};
function statusColor(s){ return STATUS_COLORS[s] || '#64748b'; }

var allTasks = [];
var activeStatusFilter = '';

// ══════════════════════════════════════════════════════
//  LOGIN GATE
// ══════════════════════════════════════════════════════
function tryLogin() {
  var val = document.getElementById('pwInput').value;
  if (val === PASSWORD) {
    sessionStorage.setItem('cargo_dash_auth', '1');
    showDash();
  } else {
    document.getElementById('pwErr').textContent = 'סיסמה שגויה';
    document.getElementById('pwInput').value = '';
  }
}
document.getElementById('pwBtn').addEventListener('click', tryLogin);
document.getElementById('pwInput').addEventListener('keydown', function(e){ if(e.key==='Enter') tryLogin(); });

function showDash() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('hdr').style.display = 'flex';
  document.getElementById('main').style.display = 'block';
  loadData();
}

// auto-skip gate if already authed this session
if (sessionStorage.getItem('cargo_dash_auth') === '1') showDash();
else document.getElementById('pwInput').focus();

// ══════════════════════════════════════════════════════
//  LOAD DATA
// ══════════════════════════════════════════════════════
function loadData() {
  document.getElementById('tableArea').innerHTML = '<div class="state"><div class="spinner"></div>טוען נתונים...</div>';
  fetch(SCRIPT_URL + '?action=data')
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success) {
        allTasks = d.tasks || [];
        render();
        var now = new Date();
        document.getElementById('lastUpd').textContent = 'עודכן ' + now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
      } else {
        showError(d.error || 'שגיאה לא ידועה');
      }
    })
    .catch(function(err){ showError(err.message); });
}
function showError(msg) {
  document.getElementById('tableArea').innerHTML =
    '<div class="state">שגיאה בטעינת הנתונים<br><span style="font-size:12px">' + msg + '</span></div>';
}
document.getElementById('refreshBtn').addEventListener('click', loadData);

// ══════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════
function render() {
  renderStats();
  renderDonut();
  renderPriBars();
  renderTable();
}

// ── DONUT by status ────────────────────────────────────
function renderDonut() {
  var counts = {};
  allTasks.forEach(function(t){
    var s = t.status || 'ללא סטטוס';
    counts[s] = (counts[s]||0) + 1;
  });
  var keys = Object.keys(counts);
  var total = allTasks.length;
  var size = 150, stroke = 26, r = (size - stroke) / 2, cx = size/2, cy = size/2;
  var circ = 2 * Math.PI * r;

  var segs = '', offset = 0;
  keys.forEach(function(s){
    var frac = total ? counts[s]/total : 0;
    var len = frac * circ;
    var c = statusColor(s);
    segs += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="'+stroke+'"' +
            ' stroke-dasharray="'+len+' '+(circ-len)+'" stroke-dashoffset="'+(-offset)+'"' +
            ' transform="rotate(-90 '+cx+' '+cy+')" style="transition:stroke-dasharray .5s"></circle>';
    offset += len;
  });

  var svg = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">' +
            (total===0 ? '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#e8f0f8" stroke-width="'+stroke+'"></circle>' : segs) +
            '</svg>' +
            '<div class="donut-center"><div class="donut-total">'+total+'</div><div class="donut-cap">משימות</div></div>';
  document.getElementById('donut').innerHTML = svg;

  // legend (clickable -> filters)
  var lg = '';
  keys.forEach(function(s){
    var c = statusColor(s);
    var dim = (activeStatusFilter && activeStatusFilter !== s) ? ' dim' : '';
    lg += '<div class="legend-item'+dim+'" onclick="setStatusFilter(\''+s.replace(/'/g,"\\'")+'\')">' +
            '<span class="legend-dot" style="background:'+c+'"></span>' +
            '<span class="legend-label">'+esc(s)+'</span>' +
            '<span class="legend-val">'+counts[s]+'</span></div>';
  });
  document.getElementById('donutLegend').innerHTML = lg || '<span style="color:var(--g400);font-size:13px">אין נתונים</span>';
}

// ── BARS by priority ───────────────────────────────────
function renderPriBars() {
  var order = ['P0','P1','P2','P3'];
  var colors = { P0:'#dc2626', P1:'#f97316', P2:'#ffb84a', P3:'#16a34a' };
  var counts = { P0:0,P1:0,P2:0,P3:0 };
  allTasks.forEach(function(t){ if (counts[t.priority]!==undefined) counts[t.priority]++; });
  var max = Math.max(1, counts.P0, counts.P1, counts.P2, counts.P3);

  var html = '';
  order.forEach(function(p){
    var pct = (counts[p]/max)*100;
    html += '<div class="pbar-row">' +
              '<div class="pbar-tag" style="background:'+colors[p]+'22;color:'+colors[p]+'">'+p+'</div>' +
              '<div class="pbar-track2"><div class="pbar-fill2" style="background:'+colors[p]+';width:'+pct+'%"></div></div>' +
              '<div class="pbar-count">'+counts[p]+'</div>' +
            '</div>';
  });
  document.getElementById('priBars').innerHTML = html;
}

function renderStats() {
  // count per status
  var counts = {};
  allTasks.forEach(function(t){
    var s = t.status || 'ללא סטטוס';
    counts[s] = (counts[s]||0) + 1;
  });

  var el = document.getElementById('stats');
  var html = '';

  // total card
  html += '<div class="stat stat-total' + (activeStatusFilter===''?' active':'') + '" onclick="setStatusFilter(\'\')">' +
            '<div class="stat-bar" style="background:var(--navy)"></div>' +
            '<div class="stat-num">' + allTasks.length + '</div>' +
            '<div class="stat-label">סה״כ משימות</div></div>';

  // per-status cards
  Object.keys(counts).forEach(function(s){
    var c = statusColor(s);
    html += '<div class="stat' + (activeStatusFilter===s?' active':'') + '" onclick="setStatusFilter(\'' + s.replace(/'/g,"\\'") + '\')">' +
              '<div class="stat-bar" style="background:' + c + '"></div>' +
              '<div class="stat-num" style="color:' + c + '">' + counts[s] + '</div>' +
              '<div class="stat-label">' + s + '</div></div>';
  });

  el.innerHTML = html;
}

function setStatusFilter(s) {
  activeStatusFilter = (activeStatusFilter === s) ? '' : s;
  render();
}

function renderTable() {
  var search = (document.getElementById('searchInput').value || '').toLowerCase();
  var typeF  = document.getElementById('typeFilter').value;
  var priF   = document.getElementById('priFilter').value;

  var rows = allTasks.filter(function(t){
    if (activeStatusFilter && t.status !== activeStatusFilter) return false;
    if (typeF && t.type !== typeF) return false;
    if (priF && t.priority !== priF) return false;
    if (search) {
      var hay = [t.title,t.initiator,t.system,t.customer,t.description,String(t.num)].join(' ').toLowerCase();
      if (hay.indexOf(search) === -1) return false;
    }
    return true;
  });

  if (rows.length === 0) {
    document.getElementById('tableArea').innerHTML = '<div class="state">אין משימות התואמות לסינון</div>';
    return;
  }

  var html = '<div class="table-scroll"><table><thead><tr>' +
    '<th>#</th><th>סוג</th><th>משימה</th><th>סטטוס</th><th>עדיפות</th>' +
    '<th>גורם יוזם</th><th class="col-hide">מערכת</th><th class="col-hide">לקוח</th>' +
    '<th class="col-hide">תאריך</th><th>קבצים</th>' +
    '</tr></thead><tbody>';

  rows.forEach(function(t){
    html += '<tr>';
    html += '<td class="td-num">' + esc(t.num) + '</td>';
    html += '<td>' + typeBadge(t.type) + '</td>';
    html += '<td class="td-title">' + esc(t.title) + (t.description?'<div class="td-desc">'+esc(t.description)+'</div>':'') + '</td>';
    html += '<td>' + statusBadge(t.status) + '</td>';
    html += '<td>' + priBadge(t.priority) + '</td>';
    html += '<td>' + esc(t.initiator) + '</td>';
    html += '<td class="col-hide">' + esc(t.system) + '</td>';
    html += '<td class="col-hide">' + esc(t.customer || '—') + '</td>';
    html += '<td class="col-hide">' + esc(t.date) + '</td>';
    html += '<td>' + filesCell(t.files) + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  document.getElementById('tableArea').innerHTML = html;
}

// ── badge builders ─────────────────────────────────────
function typeBadge(t) {
  if (!t) return '—';
  var cls = t==='תקלה'?'type-bug':(t==="פיצ'ר"?'type-feat':'type-int');
  return '<span class="badge '+cls+'">'+esc(t)+'</span>';
}
function priBadge(p) {
  if (!p) return '—';
  return '<span class="badge pri-'+esc(p)+'">'+esc(p)+'</span>';
}
function statusBadge(s) {
  if (!s) return '—';
  var c = statusColor(s);
  return '<span class="status-dot-badge" style="color:'+c+'"><span class="sd" style="background:'+c+'"></span>'+esc(s)+'</span>';
}
function filesCell(f) {
  if (!f) return '<span style="color:var(--g400)">—</span>';
  var links = String(f).split('\n').filter(function(x){return x.indexOf('http')===0;});
  if (links.length === 0) return '<span style="color:var(--g400)">—</span>';
  return '<a class="files-link" href="'+links[0]+'" target="_blank">'+links.length+' קבצים ↗</a>';
}
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── filter listeners ───────────────────────────────────
document.getElementById('searchInput').addEventListener('input', renderTable);
document.getElementById('typeFilter').addEventListener('change', renderTable);
document.getElementById('priFilter').addEventListener('change', renderTable);
</script>
</body>
</html>
